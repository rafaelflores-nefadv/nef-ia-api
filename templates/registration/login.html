{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login | NEF IA</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{% static 'css/admin.css' %}" rel="stylesheet">
</head>
<body class="login-body">
    <main class="login-wrapper">
        <section class="login-card">
            <div class="mb-4 text-center">
                <span class="logo-badge">N</span>
                <h1 class="h4 mt-3 mb-1">Painel Administrativo</h1>
                <p class="text-secondary mb-0">Acesse para continuar</p>
            </div>

            {% if form.non_field_errors %}
                <div class="alert alert-danger py-2" role="alert">
                    {% for error in form.non_field_errors %}{{ error }}{% endfor %}
                </div>
            {% endif %}

            <form method="post" novalidate>
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label fw-semibold" for="{{ form.username.id_for_label }}">Usuário</label>
                    {{ form.username }}
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold" for="{{ form.password.id_for_label }}">Senha</label>
                    {{ form.password }}
                </div>
                {% if next %}
                    <input type="hidden" name="next" value="{{ next }}">
                {% endif %}
                <button type="submit" class="btn btn-dark w-100 btn-lg mt-2">Entrar</button>
            </form>
        </section>
    </main>
</body>
</html>
