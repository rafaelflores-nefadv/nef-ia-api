{% if messages %}
    <div class="admin-messages mb-3">
        {% for message in messages %}
            {% if "success" in message.tags %}
                <div class="alert alert-success alert-dismissible fade show admin-alert" role="alert">
                    <span class="admin-alert-icon"><i class="bi bi-check-circle"></i></span>
                    <span>{{ message }}</span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Fechar"></button>
                </div>
            {% elif "warning" in message.tags %}
                <div class="alert alert-warning alert-dismissible fade show admin-alert" role="alert">
                    <span class="admin-alert-icon"><i class="bi bi-exclamation-triangle"></i></span>
                    <span>{{ message }}</span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Fechar"></button>
                </div>
            {% elif "error" in message.tags or "danger" in message.tags %}
                <div class="alert alert-danger alert-dismissible fade show admin-alert" role="alert">
                    <span class="admin-alert-icon"><i class="bi bi-x-octagon"></i></span>
                    <span>{{ message }}</span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Fechar"></button>
                </div>
            {% else %}
                <div class="alert alert-info alert-dismissible fade show admin-alert" role="alert">
                    <span class="admin-alert-icon"><i class="bi bi-info-circle"></i></span>
                    <span>{{ message }}</span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Fechar"></button>
                </div>
            {% endif %}
        {% endfor %}
    </div>
{% endif %}
