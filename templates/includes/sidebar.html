<aside class="admin-sidebar" id="adminSidebar">

        <div>
            <strong>NEF IA</strong>

        </div>
    </div>

    <nav class="sidebar-nav">
        <a class="sidebar-link {% if active_menu == 'dashboard' %}active{% endif %}" href="{% url 'dashboard' %}">

        </a>

        <section class="sidebar-group" aria-label="Automações oficiais">

            </a>

        <section class="sidebar-group" aria-label="Testes">
            <p class="sidebar-group-title">Testes</p>

                    <i class="bi bi-chevron-down sidebar-dropdown-chevron" aria-hidden="true"></i>

                <div class="sidebar-subnav">
                    <a class="sidebar-sublink {% if active_menu == 'automacoes_teste' %}active{% endif %}" href="{% url 'test_automations:list' %}">

                        <span>Automações</span>
                    </a>
                    <a class="sidebar-sublink {% if active_menu == 'prompts_teste' %}active{% endif %}" href="{% url 'test_prompts:list' %}">

            <a class="sidebar-link {% if active_menu == 'providers' %}active{% endif %}" href="{% url 'providers:list' %}">

            </a>
            <a class="sidebar-link {% if active_menu == 'credenciais' %}active{% endif %}" href="{% url 'credentials:list' %}">

            </a>

            <p class="sidebar-group-title">Operação</p>
            <a class="sidebar-link {% if active_menu == 'execucoes' %}active{% endif %}" href="{% url 'executions:list' %}">

            <a class="sidebar-link {% if active_menu == 'arquivos' %}active{% endif %}" href="{% url 'files_admin:list' %}">

            <a class="sidebar-link {% if active_menu == 'integracao_fastapi' %}active{% endif %}" href="{% url 'fastapi_integration_settings' %}">

            </a>
            <a class="sidebar-link {% if active_menu == 'integracao_fastapi_bootstrap' %}active{% endif %}" href="{% url 'fastapi_integration_bootstrap' %}">
