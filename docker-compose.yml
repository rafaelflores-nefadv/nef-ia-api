version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nef-ia-api
    env_file:
      - .env
    volumes:
      - ./:/app
      - nef_storage:/app/storage
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/health/live || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nef-ia-worker
    command: ["dramatiq", "app.workers.tasks", "--processes", "1", "--threads", "2"]
    env_file:
      - .env
    volumes:
      - ./:/app
      - nef_storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: nef-ia-postgres
    environment:
      POSTGRES_DB: nef_ia
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - nef_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d nef_ia"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: nef-ia-redis
    ports:
      - "6379:6379"
    volumes:
      - nef_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  nef_postgres_data:
  nef_redis_data:
  nef_storage:
